<!doctype html><html lang=zh><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Gaokao Prompts · 提示词编辑器</title>
<style>
 :root{--bg:#0f1115;--card:#181b22;--ink:#e8eaed;--mut:#9aa3af;--ok:#3fb950;--bd:#2a2f3a;--acc:#58a6ff}
 *{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;padding:24px}
 h1{font-size:20px;margin:0 0 4px} .sub{color:var(--mut);margin:0 0 20px;font-size:13px}
 .card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:16px;margin:0 0 18px;max-width:1000px}
 .lab{font-weight:600;font-size:16px} .desc{color:var(--mut);font-size:12.5px;margin:4px 0 10px}
 .ph{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--acc);background:#0d1117;border:1px solid var(--bd);border-radius:6px;padding:6px 8px;margin:0 0 10px;white-space:pre-wrap}
 textarea{width:100%;min-height:240px;background:#0d1117;color:var(--ink);border:1px solid var(--bd);border-radius:8px;padding:11px;font:12.5px/1.5 ui-monospace,Menlo,monospace;resize:vertical}
 .row{margin-top:10px;display:flex;gap:9px;align-items:center}
 button{background:#21262d;color:var(--ink);border:1px solid var(--bd);border-radius:7px;padding:7px 14px;cursor:pointer;font-size:13px}
 button.save{background:var(--acc);color:#0b1020;border-color:var(--acc);font-weight:600}
 button:disabled{opacity:.5;cursor:default}
 .stat{font-size:12.5px;color:var(--mut)} .stat.ok{color:var(--ok)} .stat.err{color:#f85149}
 .note{max-width:1000px;color:var(--mut);font-size:12.5px;border-left:3px solid var(--bd);padding:4px 0 4px 12px;margin:0 0 20px}
</style></head><body>
<h1>Gaokao Prompts · 提示词编辑器</h1>
<p class=sub>Edit the live game's generative prompts. Saves write to <code>prompts.json</code>; the game picks up changes on the <b>next</b> call — no redeploy. 编辑下面任一提示词并保存,游戏下一次调用即生效。</p>
<div class=note>⚠️ 占位符(<code>{`{...}`}</code>)必须保留——少了任一必需占位符会被拒绝保存(以保护线上游戏)。JSON 结构里的花括号写成 <code>{`{{`}</code> / <code>{`}}`}</code>。Reset 恢复到出厂默认。</div>
<div id=app>加载中…</div>
<script>
const app=document.getElementById('app');
async function load(){
  const r=await fetch('/prompts_data'); const reg=await r.json();
  app.innerHTML='';
  for(const key of Object.keys(reg)){
    const p=reg[key];
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class=lab>${p.label||key} <span style="color:#6e7681;font-weight:400">(${key})</span></div>
      <div class=desc>${(p.desc||'').replace(/</g,'&lt;')}</div>
      <div class=ph>${(p.desc||'').includes('placeholders')?'':''}必需占位符见上 · JSON 大括号用 {`{{ }}`}</div>
      <textarea id="t_${key}" spellcheck=false>${(p.template||'').replace(/</g,'&lt;')}</textarea>
      <div class=row><button class=save data-k="${key}">保存 Save</button>
        <button class=reset data-k="${key}">恢复默认 Reset</button>
        <span class=stat id="s_${key}"></span></div>`;
    app.appendChild(card);
  }
  app.querySelectorAll('button.save').forEach(b=>b.onclick=()=>save(b.dataset.k));
  app.querySelectorAll('button.reset').forEach(b=>b.onclick=()=>reset(b.dataset.k));
}
async function save(key){
  const t=document.getElementById('t_'+key).value;
  const s=document.getElementById('s_'+key); s.className='stat'; s.textContent='保存中…';
  const r=await fetch('/prompts_save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,template:t})});
  const d=await r.json();
  if(d.ok){s.className='stat ok';s.textContent='✓ 已保存,下次调用生效';}
  else{s.className='stat err';s.textContent='✗ '+(d.error||'保存失败');}
}
async function reset(key){
  if(!confirm('恢复 '+key+' 到出厂默认?当前编辑会丢失。')) return;
  const s=document.getElementById('s_'+key); s.className='stat'; s.textContent='恢复中…';
  const r=await fetch('/prompts_reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key})});
  const d=await r.json();
  if(d.ok){s.className='stat ok';s.textContent='✓ 已恢复默认';await load();}
  else{s.className='stat err';s.textContent='✗ '+(d.error||'失败');}
}
load();
</script></body></html>
